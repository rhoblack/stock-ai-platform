# Stock AI Platform -- Alembic configuration (v0.8 Phase A baseline)
#
# `sqlalchemy.url` is intentionally left blank: the runtime URL is supplied by
# alembic/env.py from app.config.settings.get_settings().effective_database_url
# so SQLite (dev/CI) and PostgreSQL (prod) are both supported without editing
# this file.
#
# Operators may still override the URL via the `-x url=...` CLI flag if needed,
# e.g. alembic -x url=sqlite:///./tmp.db upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

# Naming pattern keeps revisions sortable in alembic/versions/.
file_template = %%(rev)s_%%(slug)s

# Don't truncate slug -- full descriptive names are easier to scan in CI logs.
truncate_slug_length = 64

revision_environment = false
sourceless = false

output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
