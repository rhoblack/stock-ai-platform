server {
  listen       80;
  listen  [::]:80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # gzip 은 nginx 가 정적 파일에 대해 자동 처리
  gzip            on;
  gzip_min_length 256;
  gzip_proxied    any;
  gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
  gzip_vary       on;

  # /api → backend (docker-compose 안의 stock_ai_backend 컨테이너).
  # 백엔드는 read-only GET 13개만 노출 — 본 proxy 는 GET 만 흘려보낸다.
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # /health → backend
  location = /health {
    proxy_pass http://backend:8000/health;
    proxy_set_header Host $host;
  }

  # SPA 라우팅: 정적 자산은 그대로 / 그 외 경로는 index.html 로 fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 정적 자산 캐시 (해시 파일명이 vite build 출력에 포함됨)
  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }
}
