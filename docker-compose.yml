version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: stock_ai_db
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
      POSTGRES_DB: stock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: stock_ai_backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://stock_user:stock_password@db:5432/stock_db
      - SCHEDULER_ENABLED=false
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
